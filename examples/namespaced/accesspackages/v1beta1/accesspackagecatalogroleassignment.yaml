apiVersion: accesspackages.azuread.m.upbound.io/v1beta1
kind: AccessPackageCatalogRoleAssignment
metadata:
  annotations:
    meta.upbound.io/example-id: accesspackages/v1beta1/accesspackagecatalogroleassignment
  labels:
    testing.upbound.io/example-name: accesspackagecatalogroleassignment
  name: accesspackagecatalogroleassignment
  namespace: upbound-system
spec:
  forProvider:
    catalogIdSelector:
      matchLabels:
        testing.upbound.io/example-name: accesspackagecatalog
    principalObjectIdSelector:
      matchLabels:
        testing.upbound.io/example-name: accesspackagecatalogroleassignment-user
